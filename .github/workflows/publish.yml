name: Publish to PyPI

on:
  push:
    tags:
      - "v*"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install
        run: pip install -e ".[dev]"

      - name: Test
        run: pytest

  publish:
    needs: test
    runs-on: ubuntu-latest
    environment: release
    permissions:
      id-token: write
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Build
        run: |
          pip install build
          python -m build

      - name: Extract changelog
        id: changelog
        run: |
          python3 - <<'EOF'
          import re, os
          tag = os.environ["GITHUB_REF_NAME"].lstrip("v")
          text = open("CHANGELOG.md").read()
          m = re.search(
              r"## \[" + re.escape(tag) + r"\][^\n]*\n(.*?)(?=\n## \[|\Z)",
              text, re.DOTALL
          )
          notes = m.group(1).strip() if m else "No changelog entry found."
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write("notes<<EOF\n")
              f.write(notes + "\n")
              f.write("EOF\n")
          EOF

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.changelog.outputs.notes }}
          files: dist/*

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
